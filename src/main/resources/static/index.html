<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot Energy Prices</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <header>
        <h1>Spot Energy Prices</h1>
        <p class="subtitle">Hourly market prices in EUR/MWh and CZK/MWh</p>
    </header>

    <main>
        <section class="cards">
            <div class="card" id="card-current">
                <div class="card-label">Current Price</div>
                <div class="card-value" id="current-czk">—</div>
                <div class="card-secondary" id="current-eur">—</div>
                <div class="card-time" id="current-time"></div>
            </div>
            <div class="card" id="card-min">
                <div class="card-label">Today's Minimum</div>
                <div class="card-value" id="min-czk">—</div>
                <div class="card-secondary" id="min-eur">—</div>
            </div>
            <div class="card" id="card-max">
                <div class="card-label">Today's Maximum</div>
                <div class="card-value" id="max-czk">—</div>
                <div class="card-secondary" id="max-eur">—</div>
            </div>
        </section>

        <section class="chart-section">
            <div class="chart-header">
                <div class="period-nav">
                    <button id="btn-prev" class="nav-btn" onclick="shiftPeriod(-1)">&#8249;</button>
                    <span id="period-label" class="period-label">Dnes</span>
                    <button id="btn-next" class="nav-btn" onclick="shiftPeriod(1)" disabled>&#8250;</button>
                </div>
                <div class="chart-controls">
                    <button id="btn-day" class="toggle-btn active" onclick="switchPeriod('day')">Den</button>
                    <button id="btn-week" class="toggle-btn" onclick="switchPeriod('week')">Týden</button>
                    <button id="btn-month" class="toggle-btn" onclick="switchPeriod('month')">Měsíc</button>
                    <span class="ctrl-sep"></span>
                    <button id="btn-czk" class="toggle-btn active" onclick="switchCurrency('czk')">CZK</button>
                    <button id="btn-eur" class="toggle-btn" onclick="switchCurrency('eur')">EUR</button>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="priceChart"></canvas>
            </div>
        </section>

        <div class="status-bar">
            <span id="last-updated"></span>
            <span id="error-msg" class="error hidden"></span>
        </div>
    </main>

    <script src="app.js?v=2"></script>
</body>
</html>
